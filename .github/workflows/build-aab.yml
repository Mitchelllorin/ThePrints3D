name: Build AAB

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Version name (e.g. 1.2.0). Leave blank to auto-generate as 1.0.<run_number>.'
        required: false
        default: ''

# Only one AAB build at a time; if a new push lands while a build is running
# cancel the old run so the Play Store always receives the most current commit.
concurrency:
  group: build-aab
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    # Screenshot-regeneration commits (tagged [skip screenshots]) only update
    # image assets; there is no code change that warrants a new AAB.
    if: github.event_name == 'workflow_dispatch' || !contains(github.event.head_commit.message, '[skip screenshots]')
    env:
      JAVA_VERSION: '21'
      NODE_VERSION: '22.13.1'
      GOOGLE_PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set short commit SHA
        shell: bash
        run: echo "SHORT_SHA=$(echo "$GITHUB_SHA" | cut -c1-7)" >> "$GITHUB_ENV"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build -- --mode capacitor

      - name: Clear stale Android web assets
        # Ensures cap sync always starts from a clean state so every AAB reflects
        # the latest merged web changes. Keep these paths in sync with build-android.sh.
        run: rm -rf android/app/src/main/assets/public android/app/src/main/assets/capacitor.config.json android/app/src/main/assets/capacitor.plugins.json

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Verify web assets were synced
        # Fail fast if the web assets directory is missing or empty — this would
        # produce an AAB without any app content.
        shell: bash
        run: |
          set -euo pipefail
          ASSETS_DIR="android/app/src/main/assets/public"
          if [ ! -d "${ASSETS_DIR}" ]; then
            echo "::error::Web assets directory '${ASSETS_DIR}' is missing after cap sync."
            exit 1
          fi
          FILE_COUNT=$(find "${ASSETS_DIR}" -type f | wc -l)
          # A minimal Vite build produces at least: index.html, manifest.webmanifest,
          # favicon, sw.js, and one JS chunk — so fewer than 5 files means the sync
          # produced an incomplete or empty web bundle.
          if [ "${FILE_COUNT}" -lt 5 ]; then
            echo "::error::Web assets appear incomplete: only ${FILE_COUNT} file(s) in '${ASSETS_DIR}'."
            exit 1
          fi
          echo "✔ Web assets synced — ${FILE_COUNT} files in ${ASSETS_DIR}"
          echo "  Commit: ${GITHUB_SHA}"

      - name: Guard Capacitor generated Gradle include
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -f android/capacitor-cordova-android-plugins/cordova.variables.gradle ]; then
            sed -i "/cordova.variables.gradle/d" android/app/capacitor.build.gradle
          fi

      - name: Create release signing files
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_FILENAME: ${{ secrets.ANDROID_KEYSTORE_FILENAME || secrets.KEYSTORE_FILENAME }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS || secrets.KEY_ALIAS }}
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD || secrets.ANDROID_KEYSTORE_PASSWORD || secrets.KEYSTORE_PASSWORD || secrets.KEY_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD || secrets.KEY_PASSWORD || secrets.ANDROID_STORE_PASSWORD || secrets.ANDROID_KEYSTORE_PASSWORD || secrets.KEYSTORE_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${ANDROID_STORE_PASSWORD:-}" ] && [ -n "${ANDROID_KEY_PASSWORD:-}" ]; then
            ANDROID_STORE_PASSWORD="${ANDROID_KEY_PASSWORD}"
          fi
          if [ -z "${ANDROID_KEY_PASSWORD:-}" ] && [ -n "${ANDROID_STORE_PASSWORD:-}" ]; then
            ANDROID_KEY_PASSWORD="${ANDROID_STORE_PASSWORD}"
          fi

          : "${ANDROID_STORE_PASSWORD:?Missing secret ANDROID_STORE_PASSWORD}"
          : "${ANDROID_KEY_PASSWORD:?Missing secret ANDROID_KEY_PASSWORD}"

          : "${ANDROID_KEYSTORE_BASE64:?Missing secret ANDROID_KEYSTORE_BASE64 — store the base64-encoded keystore in GitHub Secrets}"
          KEYSTORE_FILENAME="${ANDROID_KEYSTORE_FILENAME:-upload-key.jks}"
          mkdir -p android/app/keystore
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "android/app/keystore/${KEYSTORE_FILENAME}"

          # Determine the signing alias.  If ANDROID_KEY_ALIAS is set but does not exist in the
          # keystore (e.g. stale secret after a keystore reset), auto-detect the first alias found
          # in the keystore; fall back to the committed-keystore default when all else fails.
          CANDIDATE_ALIAS="${ANDROID_KEY_ALIAS:-blueprint3d-upload-reset}"
          if keytool -list \
               -keystore "android/app/keystore/${KEYSTORE_FILENAME}" \
               -alias "${CANDIDATE_ALIAS}" \
               -storepass "${ANDROID_STORE_PASSWORD}" \
               >/dev/null 2>&1; then
            KEY_ALIAS="${CANDIDATE_ALIAS}"
          else
            echo "::warning::Alias '${CANDIDATE_ALIAS}' not found in keystore; auto-detecting alias."
            # keytool -list output lines look like:
            #   <alias>, <date>, PrivateKeyEntry,
            DETECTED="$(keytool -list \
               -keystore "android/app/keystore/${KEYSTORE_FILENAME}" \
               -storepass "${ANDROID_STORE_PASSWORD}" 2>/dev/null \
               | grep -E ',[[:space:]]*(PrivateKeyEntry|SecretKeyEntry)' \
               | head -1 | cut -d',' -f1 | xargs)" || DETECTED=""
            KEY_ALIAS="${DETECTED:-blueprint3d-upload-reset}"
            echo "::notice::Using alias '${KEY_ALIAS}' for signing."
          fi

          # Verify the alias exists in the keystore; auto-detect the first available alias
          # when the configured alias is wrong (e.g. ANDROID_KEY_ALIAS secret has a stale value).
          ACTUAL_ALIASES=$(keytool -list -v \
            -keystore "android/app/keystore/${KEYSTORE_FILENAME}" \
            -storepass "${ANDROID_STORE_PASSWORD}" 2>/tmp/keytool-err.txt \
            | awk '/^Alias name:/ { print $3 }') || true
          if [ -n "${ACTUAL_ALIASES}" ]; then
            echo "Keystore aliases available: ${ACTUAL_ALIASES}"
            if ! printf '%s\n' "${ACTUAL_ALIASES}" | grep -qFx "${KEY_ALIAS}"; then
              DETECTED_ALIAS=$(printf '%s\n' "${ACTUAL_ALIASES}" | head -1)
              echo "::warning::ANDROID_KEY_ALIAS secret does not match any alias in the keystore (available: ${ACTUAL_ALIASES}). Auto-selecting '${DETECTED_ALIAS}'. Update the ANDROID_KEY_ALIAS secret to silence this warning."
              KEY_ALIAS="${DETECTED_ALIAS}"
            fi
          else
            KEYTOOL_ERR=$(cat /tmp/keytool-err.txt 2>/dev/null || true)
            echo "::warning::Could not list aliases from keystore (${KEYTOOL_ERR:-no error details}). Proceeding with configured alias — verify ANDROID_STORE_PASSWORD is correct and the keystore is not corrupted."
          fi

          cat > android/key.properties <<EOF
          storePassword=${ANDROID_STORE_PASSWORD}
          keyPassword=${ANDROID_KEY_PASSWORD}
          keyAlias=${KEY_ALIAS}
          storeFile=keystore/${KEYSTORE_FILENAME}
          EOF

      - name: Compute version code and name
        env:
          INPUT_VERSION_NAME: ${{ github.event.inputs.version_name }}
        run: |
          VERSION_CODE=$(( GITHUB_RUN_NUMBER + 2 ))
          echo "VERSION_CODE=${VERSION_CODE}" >> "$GITHUB_ENV"
          if [ -n "${INPUT_VERSION_NAME}" ]; then
            # Sanitize: allow only alphanumeric characters, dots, and hyphens
            SAFE_VERSION_NAME="$(echo "${INPUT_VERSION_NAME}" | tr -cd '[:alnum:].-')"
            echo "VERSION_NAME=${SAFE_VERSION_NAME}" >> "$GITHUB_ENV"
          else
            echo "VERSION_NAME=1.0.${VERSION_CODE}" >> "$GITHUB_ENV"
          fi

      - name: Ensure Gradle wrapper executable
        run: chmod +x android/gradlew

      - name: Build Android Release (AAB)
        run: |
          cd android
          ./gradlew clean bundleRelease -PversionCode="${{ env.VERSION_CODE }}" -PversionName="${{ env.VERSION_NAME }}" --stacktrace --no-build-cache --no-configuration-cache

      - name: Build Android Release (APK)
        run: |
          cd android
          ./gradlew assembleRelease -PversionCode="${{ env.VERSION_CODE }}" -PversionName="${{ env.VERSION_NAME }}" --stacktrace --no-build-cache --no-configuration-cache

      - name: Build Android Debug (APK for testing)
        run: |
          cd android
          ./gradlew assembleDebug -PversionCode="${{ env.VERSION_CODE }}" -PversionName="${{ env.VERSION_NAME }}" --stacktrace --no-build-cache --no-configuration-cache

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab-v${{ env.VERSION_NAME }}-${{ env.SHORT_SHA }}
          path: android/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk-v${{ env.VERSION_NAME }}-${{ env.SHORT_SHA }}
          path: android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: warn

      - name: Upload Debug APK (for testing)
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk-v${{ env.VERSION_NAME }}-${{ env.SHORT_SHA }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: warn

      - name: Upload mapping file (deobfuscation)
        uses: actions/upload-artifact@v4
        with:
          name: app-release-mapping-v${{ env.VERSION_NAME }}-${{ env.SHORT_SHA }}
          path: android/app/build/outputs/mapping/release/mapping.txt
          if-no-files-found: error

      - name: Publish to Play Store internal testing
        if: env.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON != ''
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ env.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.blueprint3d.app
          releaseFiles: android/app/build/outputs/bundle/release/app-release.aab
          mappingFile: android/app/build/outputs/mapping/release/mapping.txt
          track: internal
          status: completed

      - name: Build summary
        if: always()
        shell: bash
        run: |
          commit_msg="$(git log -1 --pretty=%s 2>/dev/null | tr '|`' '//' | cut -c1-80 || echo 'unknown')"
          if [ -n "${GOOGLE_PLAY_SERVICE_ACCOUNT_JSON:-}" ]; then
            play_status="✅ Uploaded to internal testing track"
          else
            play_status="⏭ Skipped — add \`GOOGLE_PLAY_SERVICE_ACCOUNT_JSON\` secret to enable auto-upload"
          fi
          {
            echo "## Build Summary"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| **Commit** | \`${GITHUB_SHA}\` |"
            echo "| **Branch** | \`${GITHUB_REF_NAME}\` |"
            echo "| **Message** | ${commit_msg} |"
            echo "| **Version name** | ${VERSION_NAME:-unknown} |"
            echo "| **Version code** | ${VERSION_CODE:-unknown} |"
            echo "| **Artifact** | \`app-release-aab-v${VERSION_NAME:-unknown}-${SHORT_SHA:-unknown}\` |"
            echo "| **Play Store upload** | ${play_status} |"
          } >> "$GITHUB_STEP_SUMMARY"