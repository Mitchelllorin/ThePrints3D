name: Deploy PR Preview

on:
  pull_request:
    branches: [ main ]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Ensure SPA fallback in artifact
        run: cp dist/index.html dist/404.html
      - name: Stage preview under PR path
        run: |
          mkdir -p preview/pr-${{ github.event.pull_request.number }}
          cp -R dist/* preview/pr-${{ github.event.pull_request.number }}/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: preview

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}/pr-${{ github.event.pull_request.number }}/
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
