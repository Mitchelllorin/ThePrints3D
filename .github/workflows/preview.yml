name: Build & Preview

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: preview-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-pr-preview:
    name: Build PR preview
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build PR preview (relative base path)
        env:
          VITE_BASE_PATH: ./
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload PR Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy-pr-preview:
    name: Deploy PR preview
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: build-pr-preview
    permissions:
      contents: read
      pages: write
      id-token: write
      issues: write
    environment:
      name: github-pages-preview
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy PR preview
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          preview: true

      - name: Add PR preview button comment
        uses: actions/github-script@v8
        env:
          PREVIEW_URL: ${{ steps.deployment.outputs.page_url }}
        with:
          script: |
            const marker = '<!-- pr-preview-link -->';
            const previewUrl = process.env.PREVIEW_URL;

            if (!previewUrl) {
              core.setFailed('Missing preview URL from deployment output.');
              return;
            }

            const body = `${marker}
            ## PR Preview
            [🔍 Open PR Preview](${previewUrl})

            _Auto-updated on each preview deploy._`;

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;

            const { data: comments } = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find(
              (comment) => comment.user?.type === 'Bot' && comment.body?.includes(marker),
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

  build-pages:
    name: Build Pages production
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build for Pages production (repo base path)
        env:
          VITE_BASE_PATH: /BluePrint3D/
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy-pages:
    name: Deploy GitHub Pages production
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: build-pages
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
