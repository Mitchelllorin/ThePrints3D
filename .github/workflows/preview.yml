name: Build & Preview

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: preview-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-pr-preview:
    name: Build PR preview
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build PR preview
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload PR Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy-pr-preview:
    name: Deploy PR preview
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: build-pr-preview
    permissions:
      contents: read
      pages: write
      id-token: write
      issues: write
      statuses: write
    environment:
      name: github-pages-preview
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy PR preview
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          preview: true

      - name: Add PR preview button comment
        uses: actions/github-script@v8
        env:
          PREVIEW_URL: ${{ steps.deployment.outputs.page_url }}
        with:
          script: |
            // Unique marker used to find and update the same PR preview comment.
            const marker = '<!-- blueprint3d-pr-preview-comment:v1 -->';
            const previewUrl = process.env.PREVIEW_URL;

            if (!previewUrl) {
              core.setFailed('Missing preview URL from deployment output.');
              return;
            }

            const body = [
              marker,
              `[![Open PR Preview](https://img.shields.io/badge/Open%20PR%20Preview-%F0%9F%94%8D%20Click%20Here-blue?style=for-the-badge)](${previewUrl})`,
            ].join('\n');

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;

            const query = `
              query($owner: String!, $repo: String!, $issueNumber: Int!, $before: String) {
                repository(owner: $owner, name: $repo) {
                  pullRequest(number: $issueNumber) {
                    comments(last: 50, before: $before) {
                      pageInfo {
                        hasPreviousPage
                        startCursor
                      }
                      nodes {
                        databaseId
                        body
                        author {
                          __typename
                          ... on Bot {
                            login
                          }
                        }
                      }
                    }
                  }
                }
              }
            `;

            let existing = null;
            let before = null;
            let pagesSearched = 0;
            // 20 pages x 50 comments keeps lookup bounded to the most recent 1,000 comments.
            const maxPagesToSearch = 20;
            while (true) {
              pagesSearched += 1;
              const commentSearch = await github.graphql(query, {
                owner,
                repo,
                issueNumber: issue_number,
                before,
              });

              const commentConnection = commentSearch.repository.pullRequest.comments;
              existing = commentConnection.nodes.find(
                (comment) =>
                  comment.author?.__typename === 'Bot' &&
                  comment.author?.login === 'github-actions[bot]' &&
                  comment.body?.includes(marker),
              );

              if (
                existing ||
                !commentConnection.pageInfo.hasPreviousPage ||
                pagesSearched >= maxPagesToSearch
              ) {
                break;
              }

              before = commentConnection.pageInfo.startCursor;
            }

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.databaseId,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

      - name: Publish PR preview status check
        uses: actions/github-script@v8
        env:
          PREVIEW_URL: ${{ steps.deployment.outputs.page_url }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        with:
          script: |
            const previewUrl = process.env.PREVIEW_URL;
            const sha = process.env.PR_HEAD_SHA;

            if (!previewUrl) {
              core.setFailed('Missing preview URL from deployment output.');
              return;
            }

            if (!sha) {
              core.setFailed('Missing pull request head SHA.');
              return;
            }

            const { owner, repo } = context.repo;
            await github.rest.repos.createCommitStatus({
              owner,
              repo,
              sha,
              state: 'success',
              context: 'PR Preview',
              description: 'Open deployed PR preview',
              target_url: previewUrl,
            });

  build-pages:
    name: Build Pages production
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build for Pages production
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy-pages:
    name: Deploy GitHub Pages production
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: build-pages
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  build-cloudflare:
    name: Build for Cloudflare Pages
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: cloudflare-dist
          path: dist
          retention-days: 1

  deploy-cloudflare:
    name: Deploy to Cloudflare Pages
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    needs: build-cloudflare
    permissions:
      contents: read
      deployments: write
      pull-requests: write
    environment:
      name: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && 'cloudflare-production' || 'cloudflare-preview' }}
    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: cloudflare-dist
          path: dist

      - name: Deploy to Cloudflare Pages
        id: cf-deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: >-
            pages deploy dist
            --project-name=blueprint3d
            ${{ github.event_name == 'pull_request' && format('--branch=pr-{0}', github.event.pull_request.number) || '--branch=main' }}

      - name: Add Cloudflare preview comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v8
        env:
          CF_DEPLOYMENT_URL: ${{ steps.cf-deploy.outputs.deployment-url }}
        with:
          script: |
            const marker = '<!-- blueprint3d-cf-preview-comment:v1 -->';
            const deployUrl = process.env.CF_DEPLOYMENT_URL;

            if (!deployUrl) {
              core.warning('No Cloudflare deployment URL available; skipping comment.');
              return;
            }

            const body = [
              marker,
              `[![Open Cloudflare Preview](https://img.shields.io/badge/Cloudflare%20Preview-%F0%9F%8C%A5%20Click%20Here-orange?style=for-the-badge&logo=cloudflare)](${deployUrl})`,
            ].join('\n');

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;

            const query = `
              query($owner: String!, $repo: String!, $issueNumber: Int!, $before: String) {
                repository(owner: $owner, name: $repo) {
                  pullRequest(number: $issueNumber) {
                    comments(last: 50, before: $before) {
                      pageInfo { hasPreviousPage startCursor }
                      nodes {
                        databaseId
                        body
                        author {
                          __typename
                          ... on Bot { login }
                        }
                      }
                    }
                  }
                }
              }
            `;

            let existing = null;
            let before = null;
            let pagesSearched = 0;
            const maxPagesToSearch = 20;
            while (true) {
              pagesSearched += 1;
              const result = await github.graphql(query, { owner, repo, issueNumber: issue_number, before });
              const conn = result.repository.pullRequest.comments;
              existing = conn.nodes.find(
                (c) => c.author?.__typename === 'Bot' && c.author?.login === 'github-actions[bot]' && c.body?.includes(marker),
              );
              if (existing || !conn.pageInfo.hasPreviousPage || pagesSearched >= maxPagesToSearch) break;
              before = conn.pageInfo.startCursor;
            }

            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.databaseId, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }
