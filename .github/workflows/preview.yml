name: PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  preview:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Zip build output
        run: zip -r dist.zip dist

      - name: Upload to Emergent Preview
        run: |
          curl -X POST \
            -H "Content-Type: application/zip" \
            --data-binary @dist.zip \
            "https://quick-build-185.preview.emergentagent.com/api/preview"

      - name: Output preview link
        run: echo "Preview ready for PR #${{ github.event.pull_request.number }}"
