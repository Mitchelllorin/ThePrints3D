name: PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      ref:
        description: Branch, tag, or SHA to deploy
        required: false
        type: string

jobs:
  preview:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      PREVIEW_REF: ${{ inputs.ref || github.event.pull_request.head.ref || github.ref_name }}

    steps:
      - name: Checkout preview ref
        uses: actions/checkout@v4
        with:
          ref: ${{ env.PREVIEW_REF }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Zip build output
        run: zip -r dist.zip dist

      - name: Upload to Emergent Preview
        id: deploy
        run: |
          response_file="$(mktemp)"
          http_code="$(
            curl -sS -o "$response_file" -w "%{http_code}" \
              -X POST \
              -H "Content-Type: application/zip" \
              --data-binary @dist.zip \
              "https://quick-build-185.preview.emergentagent.com/api/preview"
          )"

          if [ "$http_code" -lt 200 ] || [ "$http_code" -ge 300 ]; then
            echo "Preview upload failed with HTTP $http_code"
            cat "$response_file"
            exit 1
          fi

          cat "$response_file"

          preview_url="$(
            python -c 'import re, sys; raw=open(sys.argv[1], encoding="utf-8").read(); match=re.search(r"https?://\S+", raw); print(match.group(0).rstrip("\",]}") if match else "")' "$response_file"
          )"

          echo "preview_url=$preview_url" >> "$GITHUB_OUTPUT"

      - name: Output preview status
        run: echo "Preview deployment finished for ${{ env.PREVIEW_REF }}"
      - name: Publish preview summary
        run: |
          if [ -n "${{ steps.deploy.outputs.preview_url }}" ]; then
            echo "Preview URL: ${{ steps.deploy.outputs.preview_url }}"
            {
              echo "## Preview deployment"
              echo
              echo "- Ref: \`${{ env.PREVIEW_REF }}\`"
              echo "- URL: ${{ steps.deploy.outputs.preview_url }}"
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Preview deploy completed, but no preview URL was returned by the API."
            {
              echo "## Preview deployment"
              echo
              echo "- Ref: \`${{ env.PREVIEW_REF }}\`"
              echo "- URL: _Not returned by preview API_"
            } >> "$GITHUB_STEP_SUMMARY"
          fi
