name: Train Wall Segmentation Model

# Manually triggered.  For a full training run point this at a
# GPU-enabled self-hosted runner and increase --epochs / --max-samples.
on:
  workflow_dispatch:
    inputs:
      epochs:
        description: 'Training epochs'
        required: false
        default: '5'
      max_samples:
        description: 'Max training samples (empty = all ~5 000)'
        required: false
        default: '500'
      base_ch:
        description: 'Base channel width (16 = ~1.5M params, 32 = ~6M params)'
        required: false
        default: '16'

jobs:
  train:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: ops/train/requirements.txt

      - name: Install Python dependencies
        run: pip install -r ops/train/requirements.txt

      - name: Download CubiCasa5k dataset (shallow clone)
        run: |
          git clone --depth 1 https://github.com/CubiCasa/CubiCasa5k data/cubicasa5k

      - name: Train WallSegNet
        run: |
          MAX_SAMPLES_ARG=""
          if [ -n "${{ github.event.inputs.max_samples }}" ]; then
            MAX_SAMPLES_ARG="--max-samples ${{ github.event.inputs.max_samples }}"
          fi
          python ops/train/train.py \
            --data  data/cubicasa5k \
            --out   checkpoints/ \
            --epochs ${{ github.event.inputs.epochs || '5' }} \
            --batch  8 \
            --base-ch ${{ github.event.inputs.base_ch || '16' }} \
            $MAX_SAMPLES_ARG

      - name: Export ONNX model
        run: |
          python ops/train/export.py \
            --checkpoint checkpoints/best.pth \
            --base-ch ${{ github.event.inputs.base_ch || '16' }}

      - name: Upload ONNX model artifact
        uses: actions/upload-artifact@v4
        with:
          name: floorplan-wall-segmentation-onnx
          path: public/models/floorplan-wall-segmentation.onnx
          retention-days: 30

      - name: Upload training checkpoints
        uses: actions/upload-artifact@v4
        with:
          name: training-checkpoints
          path: checkpoints/
          retention-days: 7
